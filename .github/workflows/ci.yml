name: ci

on:
  pull_request:
  push:
    branches:
      - feat/serverless
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
      - name: Validate SAM template
        working-directory: infra
        run: sam validate
