name: deploy-dev

on:
  push:
    branches:
      - main
      - feat/serverless

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-west-2
  CDK_DEFAULT_REGION: us-west-2

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest

  deploy-api:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install CDK CLI
        run: npm install -g aws-cdk
      - name: Install CDK Python deps
        working-directory: infra
        run: pip install -r requirements.txt
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Deploy dev stack
        working-directory: infra
        env:
          CORS_ORIGINS: ${{ vars.CORS_ORIGINS }}
          CLERK_ISSUER: ${{ vars.CLERK_ISSUER }}
          ADMIN_USER_IDS: ${{ vars.ADMIN_USER_IDS }}
          ENSEMBLEDATA_TOKEN: ${{ secrets.ENSEMBLEDATA_TOKEN }}
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: cdk deploy TravelPlanner-dev --require-approval never
